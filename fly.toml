# fly.toml app configuration file generated for visualsearch-ai on 2026-05-03T20:57:02Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'visualsearch-ai'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
